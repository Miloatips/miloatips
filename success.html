<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Sent | Miloatips</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { blush: '#FDF8F5', nude: '#EADDD7', dark: '#1A1A1A' }, fontFamily: { heading: ['"Playfair Display"', 'serif'], body: ['Inter', 'sans-serif'] } } } }
    </script>
</head>
<body class="bg-blush font-body flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full bg-white rounded-[40px] p-10 shadow-2xl border border-nude text-center">
        <h2 class="text-2xl font-heading font-bold mb-6 italic tracking-tight">Miloatips.</h2>
        <div class="w-20 h-20 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <h1 class="text-3xl font-heading font-semibold mb-3">Booking Sent!</h1>
        <p class="text-gray-500 mb-8 text-sm">We've opened Messenger. <strong>Please send us a message</strong> there to lock in your slot.</p>
        
        <div class="text-left bg-blush p-6 rounded-3xl border border-nude mb-8 space-y-4">
            <h3 class="text-xs font-bold uppercase tracking-widest text-gray-400">Next Steps</h3>
            <div class="flex gap-3 text-sm text-gray-600"><span>1.</span> <p>Send your service details in the chat.</p></div>
            <div class="flex gap-3 text-sm text-gray-600"><span>2.</span> <p>Wait for our artist to confirm.</p></div>
            <div class="flex gap-3 text-sm text-gray-600"><span>3.</span> <p>See you at the salon!</p></div>
        </div>

        <a href="index.html" class="inline-block px-10 py-4 bg-dark text-white rounded-full font-semibold">Back to Home</a>
    </div>
</body>
</html>
